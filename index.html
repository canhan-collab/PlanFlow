<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PlanFlow - Quản lý công việc</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }

    .calendar-day {
      min-height: 120px;
    }

    .active-tab {
      background: #111827;
      color: white;
    }

    .modal-bg {
      backdrop-filter: blur(4px);
    }

  </style>
</head>

<body class="bg-slate-100 text-slate-800">

  <div class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-40">

      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

        <div>
          <h1 class="text-2xl font-bold">
            🚀 PlanFlow
          </h1>

          <p class="text-sm text-slate-500">
            Theo dõi kế hoạch công việc
          </p>
        </div>

        <!-- ACTIONS -->
        <div class="flex items-center gap-2">

          <!-- QR BUTTON -->
          <button onclick="openQRModal()"
            class="border px-4 py-2 rounded-xl bg-white hover:bg-slate-100">

            📱 QR Mobile

          </button>

          <!-- ADD TASK -->
          <button onclick="openTaskModal()"
            class="bg-black text-white px-4 py-2 rounded-xl hover:opacity-90">

            + Thêm việc

          </button>

        </div>

      </div>

    </header>

    <!-- NAV -->
    <div class="bg-white border-b">

      <div class="max-w-7xl mx-auto px-4 py-3 flex gap-2 overflow-auto">

        <button class="tab-btn active-tab px-4 py-2 rounded-xl"
          data-tab="dashboard">

          Dashboard

        </button>

        <button class="tab-btn px-4 py-2 rounded-xl bg-slate-100"
          data-tab="tasks">

          Công việc

        </button>

        <button class="tab-btn px-4 py-2 rounded-xl bg-slate-100"
          data-tab="week">

          Tuần

        </button>

        <button class="tab-btn px-4 py-2 rounded-xl bg-slate-100"
          data-tab="month">

          Tháng

        </button>

        <button class="tab-btn px-4 py-2 rounded-xl bg-slate-100"
          data-tab="report">

          Báo cáo

        </button>

      </div>

    </div>

    <!-- MAIN -->
    <main class="flex-1 max-w-7xl mx-auto w-full p-4">

      <!-- DASHBOARD -->
      <section id="dashboard" class="tab-content">

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">

          <div class="bg-white rounded-2xl p-5 shadow">
            <p class="text-sm text-slate-500">Tổng việc</p>
            <h2 id="totalTasks"
              class="text-3xl font-bold mt-2">0</h2>
          </div>

          <div class="bg-white rounded-2xl p-5 shadow">
            <p class="text-sm text-slate-500">Hoàn thành</p>
            <h2 id="completedTasks"
              class="text-3xl font-bold text-green-600 mt-2">0</h2>
          </div>

          <div class="bg-white rounded-2xl p-5 shadow">
            <p class="text-sm text-slate-500">Đang làm</p>
            <h2 id="doingTasks"
              class="text-3xl font-bold text-blue-600 mt-2">0</h2>
          </div>

          <div class="bg-white rounded-2xl p-5 shadow">
            <p class="text-sm text-slate-500">Quá hạn</p>
            <h2 id="overdueTasks"
              class="text-3xl font-bold text-red-600 mt-2">0</h2>
          </div>

          <div class="bg-white rounded-2xl p-5 shadow">
            <p class="text-sm text-slate-500">Tỷ lệ HT</p>
            <h2 id="completionRate"
              class="text-3xl font-bold text-purple-600 mt-2">0%</h2>
          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- TASK MODAL -->
  <div id="taskModal"
    class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 modal-bg">

    <div class="bg-white rounded-2xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] overflow-auto">

      <div class="flex justify-between items-center mb-5">

        <h2 id="modalTitle"
          class="text-2xl font-bold">

          Thêm công việc

        </h2>

        <button onclick="closeTaskModal()"
          class="text-xl">

          ✕

        </button>

      </div>

      <div class="grid md:grid-cols-2 gap-4">

        <input id="taskName"
          type="text"
          placeholder="Tên công việc"
          class="border rounded-xl px-3 py-2" />

        <input id="taskGroup"
          type="text"
          placeholder="Nhóm công việc"
          class="border rounded-xl px-3 py-2" />

      </div>

      <div class="flex justify-end gap-3 mt-5">

        <button onclick="closeTaskModal()"
          class="px-4 py-2 rounded-xl border">

          Hủy

        </button>

        <button onclick="saveTask()"
          class="bg-black text-white px-4 py-2 rounded-xl">

          Lưu công việc

        </button>

      </div>

    </div>

  </div>

  <!-- QR MODAL -->
  <div id="qrModal"
    class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-6 w-[340px] text-center">

      <div class="flex justify-between items-center mb-4">

        <h2 class="text-xl font-bold">
          Mở trên điện thoại
        </h2>

        <button onclick="closeQRModal()">
          ✕
        </button>

      </div>

      <div id="qrcode"
        class="flex justify-center mb-4"></div>

      <p class="text-sm text-slate-500">
        Quét QR bằng điện thoại để mở PlanFlow
      </p>

    </div>

  </div>

  <script>

    let tasks = JSON.parse(
      localStorage.getItem("planflow_tasks")
    ) || [];

    let editingId = null;

    function saveToStorage() {

      localStorage.setItem(
        "planflow_tasks",
        JSON.stringify(tasks)
      );
    }

    function openTaskModal() {

      document.getElementById("taskModal")
        .classList.remove("hidden");

      document.getElementById("taskModal")
        .classList.add("flex");
    }

    function closeTaskModal() {

      document.getElementById("taskModal")
        .classList.add("hidden");

      document.getElementById("taskModal")
        .classList.remove("flex");
    }

    function saveTask() {

      const task = {
        id: Date.now(),
        name: taskName.value,
        group: taskGroup.value
      };

      tasks.push(task);

      saveToStorage();

      closeTaskModal();

      alert("Đã lưu công việc");
    }

    // QR FUNCTIONS

    function openQRModal() {

      document.getElementById("qrModal")
        .classList.remove("hidden");

      document.getElementById("qrModal")
        .classList.add("flex");

      const qr = document.getElementById("qrcode");

      qr.innerHTML = "";

      new QRCode(qr, {
        text: window.location.href,
        width: 220,
        height: 220
      });
    }

    function closeQRModal() {

      document.getElementById("qrModal")
        .classList.add("hidden");

      document.getElementById("qrModal")
        .classList.remove("flex");
    }

    // SERVICE WORKER

    if ("serviceWorker" in navigator) {

      window.addEventListener("load", () => {

        navigator.serviceWorker
          .register("sw.js")

          .then(() => {

            console.log(
              "Service Worker Registered"
            );

          });
      });
    }

  </script>

</body>
</html>
